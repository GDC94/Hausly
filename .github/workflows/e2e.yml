name: E2E

# Gate determinista de Playwright (specs/TESTING.md §2, §4, §6) — el complemento
# E2E del gate de calidad del #2 (ci.yml). Corre contra el PREVIEW de Vercel ya
# deployado, no contra un build local: así testea el sistema real (RSC + Server
# Actions + Sanity), con el bypass de Deployment Protection.
on:
  # Vercel publica un deploy → corremos los E2E contra ESE preview. Ojo: los
  # workflows disparados por `deployment_status` usan SIEMPRE la copia del branch
  # default (main), así que este trigger queda activo una vez mergeado este PR.
  deployment_status:
  # Para validar a mano cualquier preview (ej. el de este mismo PR antes de
  # mergear): se le pasa la URL del preview.
  workflow_dispatch:
    inputs:
      preview_url:
        description: "URL del preview de Vercel a testear"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.deployment_status.environment_url || github.event.inputs.preview_url }}
  cancel-in-progress: true

jobs:
  e2e:
    name: playwright
    # SÓLO previews exitosos (o dispatch manual). NUNCA production: el happy-path
    # del lead ESCRIBE en Sanity → contra prod crearía un lead de prueba real. El
    # preview apunta al dataset de juguete (staging), production al real.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       contains(github.event.deployment_status.environment, 'Preview'))
    runs-on: ubuntu-latest
    env:
      VERCEL_PREVIEW_URL: ${{ github.event.inputs.preview_url || github.event.deployment_status.environment_url }}
    steps:
      # Gate de seguridad: el bypass secret SOLO se manda a un preview de ESTE
      # proyecto. Bloquea (a) un `workflow_dispatch` con una URL arbitraria que
      # filtraría el secret a otro host, y (b) correr el lead-E2E (que escribe)
      # contra production. La URL de prod (hausly.vercel.app / dominio propio) NO
      # matchea el patrón de los previews (`hausly-<hash>-gdc94s-projects`).
      - name: Validar que el target es un preview de Vercel de este proyecto
        run: |
          if [[ ! "$VERCEL_PREVIEW_URL" =~ ^https://hausly-[a-z0-9-]+-gdc94s-projects\.vercel\.app/?$ ]]; then
            echo "::error::VERCEL_PREVIEW_URL no es un preview de Vercel válido: '$VERCEL_PREVIEW_URL'"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # `--ignore-scripts`: el job corre código del SHA del PR; sin esto, un
      # postinstall malicioso correría ANTES del gate de URL con el secret en env.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm exec playwright install --with-deps chromium
      - name: E2E
        run: pnpm test:e2e
        # Secret SOLO en el step que lo necesita (no a nivel job): acota la
        # superficie de exfiltración cuando corre código de un PR (specs/TESTING.md §4).
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
